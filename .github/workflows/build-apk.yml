name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer
        run: |
          docker run --rm \
            --entrypoint bash \
            --env LDFLAGS="-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384" \
            --volume "$(pwd)":/home/user/hostcwd \
            --volume ~/.buildozer:/home/user/.buildozer \
            --workdir /home/user/hostcwd \
            kivy/buildozer:latest \
            -c '
              SDK=/home/user/.buildozer/android/platform/android-sdk
              for sm in "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"; do
                if [ -x "$sm" ]; then yes | "$sm" --licenses >/dev/null 2>&1; fi
              done
              yes | buildozer android debug
            '

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: live-captions-apk
          path: ./bin/*.apk
