name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Accept Android SDK license and Build APK
        run: |
          # Accept SDK licenses non-interactively (buildozer invokes sdkmanager which needs pre-accepted licenses)
          docker run --rm \
            --volume ~/.buildozer:/home/user/.buildozer \
            --workdir /tmp \
            kivy/buildozer:latest \
            bash -c 'yes | /home/user/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null; yes | /home/user/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses 2>/dev/null; exit 0'
          # Build
          docker run --rm \
            --volume "$(pwd)":/home/user/hostcwd \
            --volume ~/.buildozer:/home/user/.buildozer \
            --workdir /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: live-captions-apk
          path: ./bin/*.apk
